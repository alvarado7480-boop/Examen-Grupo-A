<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Listado{% endblock %} | Alta Gama</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&family=Outfit:wght@300;400;500&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <style>
        :root {
            --ag-bg: #0f0e0d;
            --ag-surface: #1a1918;
            --ag-elevated: #22211f;
            --ag-cream: #f4f0e8;
            --ag-muted: #9a948a;
            --ag-gold: #c4a35a;
            --ag-gold-dim: #8a753f;
            --ag-line: rgba(196, 163, 90, 0.22);
        }
        body.ag-body {
            font-family: "Outfit", system-ui, sans-serif;
            font-weight: 300;
            color: var(--ag-cream);
            background: var(--ag-bg);
            min-height: 100vh;
            letter-spacing: 0.02em;
        }
        body.ag-body::before {
            content: "";
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse 80% 50% at 50% -20%, rgba(196, 163, 90, 0.08), transparent 50%),
                linear-gradient(180deg, #121110 0%, var(--ag-bg) 35%);
            pointer-events: none;
            z-index: 0;
        }
        .ag-nav {
            position: relative;
            z-index: 10;
            background: rgba(15, 14, 13, 0.92) !important;
            border-bottom: 1px solid var(--ag-line);
            padding-top: 1rem;
            padding-bottom: 1rem;
        }
        .ag-brand {
            font-family: "Cormorant Garamond", Georgia, serif;
            font-weight: 600;
            font-size: 1.75rem;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--ag-cream) !important;
        }
        .ag-brand small {
            display: block;
            font-family: "Outfit", sans-serif;
            font-size: 0.65rem;
            font-weight: 300;
            letter-spacing: 0.35em;
            text-transform: uppercase;
            color: var(--ag-gold);
            margin-top: 0.2rem;
        }
        .ag-nav .nav-link {
            color: var(--ag-muted) !important;
            font-size: 0.8rem;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            padding: 0.5rem 0.75rem !important;
        }
        .ag-nav .nav-link:hover {
            color: var(--ag-gold) !important;
        }
        .ag-main {
            position: relative;
            z-index: 1;
        }
        .ag-alert {
            background: var(--ag-elevated);
            border: 1px solid var(--ag-line);
            color: var(--ag-cream);
        }
        .ag-alert .btn-close { filter: invert(0.9); }
        .ag-alert.alert-success,
        .ag-alert.alert-danger,
        .ag-alert.alert-warning,
        .ag-alert.alert-info {
            background: var(--ag-elevated) !important;
            color: var(--ag-cream) !important;
        }
        .ag-alert.alert-success { border-color: rgba(100, 130, 100, 0.45) !important; }
        .ag-alert.alert-danger { border-color: rgba(150, 90, 90, 0.5) !important; }
        .ag-alert.alert-warning { border-color: rgba(180, 150, 80, 0.45) !important; }
        .ag-alert.alert-info { border-color: var(--ag-line) !important; }
        .ag-btn-gold {
            --bs-btn-color: var(--ag-bg);
            --bs-btn-bg: var(--ag-gold);
            --bs-btn-border-color: var(--ag-gold);
            --bs-btn-hover-bg: #d4b56a;
            --bs-btn-hover-border-color: #d4b56a;
            --bs-btn-font-weight: 500;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            font-size: 0.75rem;
            padding: 0.55rem 1.25rem;
        }
        .ag-btn-ghost {
            --bs-btn-color: var(--ag-cream);
            --bs-btn-border-color: var(--ag-line);
            --bs-btn-hover-bg: rgba(196, 163, 90, 0.12);
            --bs-btn-hover-border-color: var(--ag-gold);
            letter-spacing: 0.1em;
            text-transform: uppercase;
            font-size: 0.7rem;
        }
    </style>
    {% block extra_head %}{% endblock %}
</head>
<body class="ag-body">
<nav class="navbar navbar-expand-lg ag-nav">
    <div class="container">
        <a class="navbar-brand ag-brand" href="{{ url_for('listar') }}">
            Alta Gama
            <small>tecnología de precisión</small>
        </a>
        <div class="navbar-nav ms-auto flex-row gap-1 gap-md-2">
            <a class="nav-link" href="{{ url_for('listar') }}">Listado</a>
            <a class="nav-link" href="{{ url_for('registrar') }}">Añadir</a>
        </div>
    </div>
</nav>

<main class="container pb-5 ag-main">
    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            {% for category, message in messages %}
                <div class="alert ag-alert alert-{{ category }} alert-dismissible fade show" role="alert">
                    {{ message }}
                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Cerrar"></button>
                </div>
            {% endfor %}
        {% endif %}
    {% endwith %}

    {% block content %}{% endblock %}
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>
</body>
</html>
